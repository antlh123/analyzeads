<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VNPAY Ads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f8fa;--bg2:#fff;--bg3:#f1f3f6;
  --border:#e4e7ed;--border2:#d0d4dc;
  --text:#1a1d24;--text2:#5a6278;--text3:#9aa0b0;
  --blue:#1d6fe8;--blue-bg:#eff4ff;
  --green:#0d9a5e;--green-bg:#edfaf4;
  --amber:#c97000;--amber-bg:#fff8e6;
  --red:#d13535;--red-bg:#fff0f0;
  --orange:#c45c00;--orange-bg:#fff4ec;
  --purple:#6d3fc9;--purple-bg:#f3eeff;
  --gray:#5a6278;--gray-bg:#f1f3f6;
  --r:10px;--rs:6px;
  --font:'Be Vietnam Pro',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:600}
.topbar p{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.main{max-width:1440px;margin:0 auto;padding:24px 28px}
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.kpi.kb::after{background:var(--blue)}.kpi.kg::after{background:var(--green)}
.kpi.ka::after{background:var(--amber)}.kpi.kp::after{background:var(--purple)}
.kpi.kr::after{background:var(--red)}
.kpi-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
.kpi-val{font-size:26px;font-weight:600;margin-top:8px;font-family:var(--mono);letter-spacing:-.5px}
.kpi.kb .kpi-val{color:var(--blue)}.kpi.kg .kpi-val{color:var(--green)}
.kpi.ka .kpi-val{color:var(--amber)}.kpi.kp .kpi-val{color:var(--purple)}
.kpi.kr .kpi-val{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.chart-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-lbl{font-size:12px;color:var(--text2);width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-inner{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:7px;min-width:30px}
.bar-inner span{font-size:11px;font-weight:500;color:#fff;font-family:var(--mono);white-space:nowrap}
.bar-num{font-size:11px;color:var(--text3);width:55px;text-align:right;font-family:var(--mono);flex-shrink:0}

/* OBJECTIVE CARDS */
.obj-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.obj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px 10px;border-left:3px solid transparent}
.obj-card.oc-cta{border-left-color:#c0392b}.obj-card.oc-reach{border-left-color:#1b6b3a}
.obj-card.oc-engagement{border-left-color:#1a56c7}.obj-card.oc-other{border-left-color:var(--gray)}
.obj-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);margin-bottom:6px}
.oc-cta .obj-name{color:#c0392b}.oc-reach .obj-name{color:#1b6b3a}
.oc-engagement .obj-name{color:#1a56c7}.oc-other .obj-name{color:var(--gray)}
.obj-m{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px}
.obj-m-lbl{color:var(--text3)}.obj-m-val{font-family:var(--mono);font-weight:500}
.obj-m-val.good{color:var(--green)}.obj-m-val.bad{color:var(--red)}
.obj-best{display:inline-block;margin-top:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:20px;background:var(--green-bg);color:var(--green);font-family:var(--mono)}

/* RECO — compact */
.reco-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:20px}
.reco-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.reco-title span{font-size:11px;font-weight:400;color:var(--text3);font-family:var(--mono)}
.reco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.rc{border-radius:var(--rs);padding:10px 12px;border-left:3px solid transparent}
.rc.rc-scale{background:#edfaf4;border-left-color:var(--green)}
.rc.rc-maint{background:#eff4ff;border-left-color:var(--blue)}
.rc.rc-watch{background:#fff8e6;border-left-color:var(--amber)}
.rc.rc-stop {background:#fff0f0;border-left-color:var(--red)}
.rc.rc-info {background:#f3eeff;border-left-color:var(--purple)}
.rc-head{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);margin-bottom:6px}
.rc.rc-scale .rc-head{color:var(--green)}.rc.rc-maint .rc-head{color:var(--blue)}
.rc.rc-watch .rc-head{color:var(--amber)}.rc.rc-stop  .rc-head{color:var(--red)}
.rc.rc-info  .rc-head{color:var(--purple)}
.rc-list{display:flex;flex-direction:column;gap:3px}
.rc-item{font-size:11px;color:var(--text2);padding:4px 7px;background:rgba(255,255,255,.65);border-radius:3px;line-height:1.45}
.rc-item b{font-weight:600;color:var(--text)}
.rc-item .m{font-size:10px;color:var(--text3);font-family:var(--mono)}
.rc-text{font-size:11px;color:var(--text2);line-height:1.6;padding:4px 7px;background:rgba(255,255,255,.65);border-radius:3px}

/* FILTERS */
.filters-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filters-bar label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.filters-bar select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);padding:5px 10px;font-size:12px;cursor:pointer;outline:none;font-family:var(--font)}
.filters-bar select:focus{border-color:var(--blue)}
.vsep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.count-badge{margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap}
.view-toggle{display:flex;gap:6px;margin-bottom:14px}
.view-btn{border:1px solid var(--border2);background:var(--bg3);color:var(--text2);border-radius:20px;padding:5px 16px;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.view-btn.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.view-btn:hover:not(.active){border-color:var(--blue);color:var(--blue)}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.ad-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .15s}
.ad-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.c-rattot{border-left:3px solid var(--green)}.c-tot{border-left:3px solid var(--blue)}
.c-tb{border-left:3px solid var(--amber)}.c-kem{border-left:3px solid var(--orange)}
.c-langphi{border-left:3px solid var(--red)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ad-name{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.cat-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.p-rattot{background:var(--green-bg);color:var(--green)}.p-tot{background:var(--blue-bg);color:var(--blue)}
.p-tb{background:var(--amber-bg);color:var(--amber)}.p-kem{background:var(--orange-bg);color:var(--orange)}
.p-langphi{background:var(--red-bg);color:var(--red)}.p-err{background:var(--gray-bg);color:var(--gray)}
.ad-sub{font-size:11px;color:var(--text3)}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.bank-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono)}
.obj-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);font-weight:500}
.obj-cta{background:#fde8e8;color:#c0392b}.obj-reach{background:#e8f5e9;color:#1b6b3a}
.obj-engagement{background:#e8f0fe;color:#1a56c7}.obj-other{background:var(--bg3);color:var(--text3)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--text3);font-family:var(--mono);display:inline-flex;align-items:center;gap:4px}
.chip b{font-weight:500}.good{color:var(--green)}.bad{color:var(--red)}.neu{color:var(--text)}
.div{height:1px;background:var(--border)}
.note{font-size:12px;color:var(--text2);line-height:1.6}
.insight{font-size:12px;color:var(--blue);background:var(--blue-bg);border-radius:var(--rs);padding:8px 10px;line-height:1.6}

/* THUMBNAIL — no-image fallback */
.thumb-wrap{border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);background:var(--bg3);position:relative}
.thumb-wrap img{width:100%;max-height:220px;object-fit:cover;display:block}
.thumb-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.5));padding:8px 10px;display:flex;justify-content:flex-end}
.fb-btn{font-size:11px;color:#fff;text-decoration:none;font-family:var(--mono);background:rgba(0,0,0,.35);padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
.fb-btn:hover{background:rgba(0,0,0,.55)}
.fb-fallback{display:none;padding:10px 12px;font-size:12px}
.fb-fallback a{color:var(--blue);text-decoration:none;font-family:var(--mono)}
.fb-link-only{font-size:12px;color:var(--blue);text-decoration:none;font-family:var(--mono)}

/* TABLE */
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:auto;width:100%}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:5}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--mono);cursor:pointer;user-select:none}
th:hover{color:var(--blue)}
th.sa::after{content:' ↑';color:var(--blue)}th.sd::after{content:' ↓';color:var(--blue)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}tr:hover td{background:#fafbff}
.tmono{font-family:var(--mono);white-space:nowrap;font-size:12px}
.td-thumb img{width:60px;height:45px;object-fit:cover;border-radius:4px;border:1px solid var(--border);display:block}
.td-thumb a{font-size:11px;color:var(--blue);text-decoration:none;display:block;margin-top:3px;font-family:var(--mono)}
@media(max-width:1100px){.charts-row{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}.main{padding:16px}}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>VNPAY · Ads Performance Dashboard</h1>
    <p>21 ads · 25/03/2026 10:09</p>
  </div>
</div>
<div class="main">

<div class="kpi-row">
  <div class="kpi kb"><div class="kpi-lbl">Tổng tiêu tiền</div><div class="kpi-val" id="k-spend">--</div><div class="kpi-sub">VND</div></div>
  <div class="kpi kg"><div class="kpi-lbl">Avg CTR</div><div class="kpi-val" id="k-ctr">--</div><div class="kpi-sub">tốt ≥ 0.6%</div></div>
  <div class="kpi ka"><div class="kpi-lbl">Avg CR</div><div class="kpi-val" id="k-cr">--</div><div class="kpi-sub">tốt ≥ 2%</div></div>
  <div class="kpi kp"><div class="kpi-lbl">Avg ER</div><div class="kpi-val" id="k-er">--</div><div class="kpi-sub">tốt ≥ 0.5%</div></div>
  <div class="kpi kr"><div class="kpi-lbl">Rất Tốt + Tốt</div><div class="kpi-val" id="k-good">--</div><div class="kpi-sub" id="k-good-sub">ads hiệu quả</div></div>
</div>

<div class="charts-row">
  <div class="chart-card"><div class="chart-title">Chi tiêu theo ngân hàng</div><div id="chart-bank"></div></div>
  <div class="chart-card"><div class="chart-title">Phân bố đánh giá</div><div id="chart-cat"></div></div>
  <div class="chart-card"><div class="chart-title">Conversion theo loại chiến dịch</div><div id="chart-obj"></div></div>
</div>

<!-- Objective summary cards -->
<div class="obj-row" id="obj-row"></div>

<!-- Recommendations — compact -->
<div class="reco-block">
  <div class="reco-title">Khuyến nghị tổng hợp <span id="reco-sub"></span></div>
  <div class="reco-grid" id="reco-grid"></div>
</div>

<div class="filters-bar">
  <label>Ngân hàng</label>
  <select id="f-bank" onchange="applyFilters()"><option value="">Tất cả</option></select>
  <div class="vsep"></div>
  <label>Loại CĐ</label>
  <select id="f-obj" onchange="applyFilters()">
    <option value="">Tất cả</option>
    <option value="CTA">CTA</option>
    <option value="Reach">Reach</option>
    <option value="Engagement">Engagement</option>
    <option value="Other">Other</option>
  </select>
  <div class="vsep"></div>
  <label>Chiến dịch</label>
  <select id="f-camp" onchange="applyFilters()"><option value="">Tất cả</option></select>
  <div class="vsep"></div>
  <label>Nhóm QC</label>
  <select id="f-adset" onchange="applyFilters()"><option value="">Tất cả</option></select>
  <div class="vsep"></div>
  <label>Đánh giá</label>
  <select id="f-cat" onchange="applyFilters()">
    <option value="">Tất cả</option>
    <option value="Rất Tốt">Rất Tốt</option>
    <option value="Tốt">Tốt</option>
    <option value="TB">TB</option>
    <option value="Kém">Kém</option>
    <option value="Lãng Phí">Lãng Phí</option>
  </select>
  <span class="count-badge" id="count-badge">-- ads</span>
</div>

<div class="view-toggle">
  <button class="view-btn active" id="btn-card" onclick="switchView('cards')">Dạng thẻ</button>
  <button class="view-btn" id="btn-table" onclick="switchView('table')">Dạng bảng</button>
</div>
<div id="view-cards"></div>
<div id="view-table" style="display:none"></div>

</div>

const CAT_ORDER = {"Rất Tốt":0,"Tốt":1,"TB":2,"Kém":3,"Lãng Phí":4,"":5};
const BANK_COL  = {"BIDV":"#d97706","Vietcombank":"#1d6fe8","Vietinbank":"#0d9a5e","Agribank":"#6d3fc9","VNPAY / All":"#5a6278"};
const OBJ_COL   = {"CTA":"#c0392b","Reach":"#1b6b3a","Engagement":"#1a56c7","Other":"#5a6278"};
const OBJ_CLS   = {"CTA":"oc-cta","Reach":"oc-reach","Engagement":"oc-engagement","Other":"oc-other"};
const OBJ_TCLS  = {"CTA":"obj-cta","Reach":"obj-reach","Engagement":"obj-engagement","Other":"obj-other"};

let allData=RAW, filtered=[...RAW], sortCol=null, sortDir=1, curView="cards";

function detectObj(n){
  n=(n||"").toUpperCase();
  if(n.includes("ENGAGEMENT"))return"Engagement";
  if(n.includes("REACH"))return"Reach";
  if(n.includes("CTA"))return"CTA";
  return"Other";
}
allData.forEach(r=>{ if(!r._objective) r._objective=detectObj(r["Chiến Dịch"]); });

const n   = v=>{const f=parseFloat(String(v||"").replace(/,/g,""));return isNaN(f)?0:f;};
const fmtM= v=>{if(v>=1e9)return(v/1e9).toFixed(1)+"B";if(v>=1e6)return(v/1e6).toFixed(1)+"M";if(v>=1e3)return Math.round(v/1e3)+"K";return Math.round(v).toLocaleString();};
const pct = v=>parseFloat(v||0).toFixed(2)+"%";
const bCol= b=>BANK_COL[b]||"#5a6278";
const bTag= b=>{const c=bCol(b);return`<span class="bank-tag" style="background:${c}18;color:${c};border:1px solid ${c}35">${b||"N/A"}</span>`;};
const oTag= o=>{const c=OBJ_TCLS[o]||"obj-other";return`<span class="obj-tag ${c}">${o||"—"}</span>`;};
const cCls= c=>({"Rất Tốt":"rattot","Tốt":"tot","TB":"tb","Kém":"kem","Lãng Phí":"langphi"})[c]||"err";
const pCls= c=>({"Rất Tốt":"p-rattot","Tốt":"p-tot","TB":"p-tb","Kém":"p-kem","Lãng Phí":"p-langphi"})[c]||"p-err";
const mChip=(lbl,val,thr)=>{
  const v=parseFloat(val);
  const cl=isNaN(v)?"neu":(v>=thr?"good":"bad");
  const d=(val===null||val===""||isNaN(v))?"N/A":v.toFixed(2)+"%";
  return`<div class="chip">${lbl} <b class="${cl}">${d}</b></div>`;
};

// Thêm referrerpolicy + onerror để xử lý ảnh hết hạn token.
function thumbBlock(r){
  const img=r._thumbnail||"", url=r._post_url||"";
  const uid="t"+String(r["Ad ID"]||Math.random()).replace(/\D/g,"");
  if(img){
    const ov=url?`<div class="thumb-overlay"><a class="fb-btn" href="${url}" target="_blank" rel="noopener">Mở Facebook ↗</a></div>`:"";
    const fb=url?`<a href="${url}" target="_blank" rel="noopener">📎 Ảnh hết hạn — xem trên Facebook ↗</a>`:`<span style="color:var(--text3)">Ảnh không load được</span>`;
    return`<div class="thumb-wrap">
      <img referrerpolicy="no-referrer" loading="lazy" src="${img}"
           onerror="this.style.display='none';document.getElementById('fb_${uid}').style.display='block'">
      ${ov}
      <div class="fb-fallback" id="fb_${uid}">${fb}</div>
    </div>`;
  }
  if(url)return`<a class="fb-link-only" href="${url}" target="_blank" rel="noopener">↗ Xem post Facebook</a>`;
  return"";
}

// ── OBJECTIVE OVERVIEW ──────────────────────────────────────────────────
function renderObjRow(data){
  const st={};
  ["CTA","Reach","Engagement","Other"].forEach(obj=>{
    const sub=data.filter(r=>r._objective===obj);
    if(!sub.length)return;
    const crs =sub.map(r=>parseFloat(r._cr )).filter(v=>!isNaN(v)&&v!==null);
    const ctrs=sub.map(r=>parseFloat(r._ctr)).filter(v=>!isNaN(v)&&v!==null);
    const ers =sub.map(r=>parseFloat(r._er )).filter(v=>!isNaN(v)&&v!==null);
    st[obj]={
      count: sub.length,
      avg_cr:  crs.length ?(crs.reduce((a,b)=>a+b,0)/crs.length).toFixed(2):null,
      avg_ctr: ctrs.length?(ctrs.reduce((a,b)=>a+b,0)/ctrs.length).toFixed(2):null,
      avg_er:  ers.length ?(ers.reduce((a,b)=>a+b,0)/ers.length).toFixed(2):null,
      flights: sub.reduce((s,r)=>s+parseFloat(r._total_flight||0),0).toFixed(0),
      good:    sub.filter(r=>["Rất Tốt","Tốt"].includes(r.category)).length,
    };
  });
  const best=Object.entries(st).filter(([,s])=>s.avg_cr!==null).sort((a,b)=>parseFloat(b[1].avg_cr)-parseFloat(a[1].avg_cr))[0];
  document.getElementById("obj-row").innerHTML=Object.entries(st).map(([obj,s])=>{
    const crV=s.avg_cr!==null?parseFloat(s.avg_cr):null;
    const ctrV=s.avg_ctr!==null?parseFloat(s.avg_ctr):null;
    const erV=s.avg_er!==null?parseFloat(s.avg_er):null;
    return`<div class="obj-card ${OBJ_CLS[obj]||'oc-other'}">
      <div class="obj-name">${obj} · ${s.count} ads</div>
      <div class="obj-m"><span class="obj-m-lbl">Avg CR</span><span class="obj-m-val ${crV!==null?(crV>=2?'good':'bad'):''}"> ${crV!==null?crV.toFixed(2)+'%':'N/A'}</span></div>
      <div class="obj-m"><span class="obj-m-lbl">Avg CTR</span><span class="obj-m-val ${ctrV!==null?(ctrV>=0.6?'good':'bad'):''}"> ${ctrV!==null?ctrV.toFixed(2)+'%':'N/A'}</span></div>
      <div class="obj-m"><span class="obj-m-lbl">Avg ER</span><span class="obj-m-val ${erV!==null?(erV>=0.5?'good':'bad'):''}"> ${erV!==null?erV.toFixed(2)+'%':'N/A'}</span></div>
      <div class="obj-m"><span class="obj-m-lbl">Conversions</span><span class="obj-m-val">${parseInt(s.flights).toLocaleString()}</span></div>
      <div class="obj-m"><span class="obj-m-lbl">Hiệu quả</span><span class="obj-m-val">${s.good}/${s.count}</span></div>
      ${best&&best[0]===obj?'<span class="obj-best">CR cao nhất</span>':''}
    </div>`;
  }).join("");
}

// ── RECOMMENDATIONS (compact) ───────────────────────────────────────────
function buildReco(data){
  const scale=data.filter(r=>r.category==="Rất Tốt");
  const maint=data.filter(r=>r.category==="Tốt");
  const watch=data.filter(r=>r.category==="TB");
  const stop =data.filter(r=>["Kém","Lãng Phí"].includes(r.category));
  const stopSpend=stop.reduce((s,r)=>s+n(r["Tiêu Tiền"]),0);

  // Phân tích objective
  const op={};
  ["CTA","Reach","Engagement"].forEach(obj=>{
    const sub=data.filter(r=>r._objective===obj);
    if(!sub.length)return;
    const crs=sub.map(r=>parseFloat(r._cr)).filter(v=>!isNaN(v)&&v!==null);
    op[obj]={avgCR:crs.length?crs.reduce((a,b)=>a+b,0)/crs.length:0, count:sub.length,
               flights:sub.reduce((s,r)=>s+parseFloat(r._total_flight||0),0)};
  });
  const sorted=Object.entries(op).sort((a,b)=>b[1].avgCR-a[1].avgCR);
  const best=sorted[0], worst=sorted[sorted.length-1];

  const cards=[];

  // Insight objective — 1 dòng ngắn
  if(sorted.length>=2){
    let txt=`<div class="rc-text">`;
    if(best)txt+=`<b>${best[0]}</b> hiệu quả nhất (avg CR ${best[1].avgCR.toFixed(2)}%, ${Math.round(best[1].flights)} conversions). `;
    if(worst&&worst[0]!==best[0])txt+=`<b>${worst[0]}</b> thấp nhất (${worst[1].avgCR.toFixed(2)}%) — xem lại landing page.`;
    txt+=`</div>`;
    cards.push({cls:"rc-info",head:"Phân tích loại CĐ",list:[txt]});
  }

  // Scale
  if(scale.length) cards.push({cls:"rc-scale",head:"Nhân ngân sách ngay",
    list:scale.map(r=>`<div class="rc-item"><b>${r["Mẫu QC"]}</b> ${oTag(r._objective)} ${bTag(r["Ngân Hàng"])}<div class="m">CR ${r._cr?parseFloat(r._cr).toFixed(2)+'%':'N/A'}</div></div>`)
  });

  // Maintain
  if(maint.length) cards.push({cls:"rc-maint",head:"Duy trì & tối ưu",
    list:maint.map(r=>`<div class="rc-item"><b>${r["Mẫu QC"]}</b> ${oTag(r._objective)} ${bTag(r["Ngân Hàng"])}<div class="m">CR ${r._cr?parseFloat(r._cr).toFixed(2)+'%':'N/A'}</div></div>`)
  });

  // Watch
  if(watch.length) cards.push({cls:"rc-watch",head:"Theo dõi 3–5 ngày",
    list:watch.map(r=>`<div class="rc-item"><b>${r["Mẫu QC"]}</b> ${oTag(r._objective)} ${bTag(r["Ngân Hàng"])}</div>`)
  });

  // Stop
  if(stop.length) cards.push({cls:"rc-stop",head:`Cân nhắc dừng · ${fmtM(stopSpend)}đ`,
    list:stop.map(r=>`<div class="rc-item"><b>${r["Mẫu QC"]}</b> ${oTag(r._objective)} ${bTag(r["Ngân Hàng"])}<div class="m">CR ${r._cr?parseFloat(r._cr).toFixed(2)+'%':'N/A'}</div></div>`)
  });

  const bestCR=data.filter(r=>r._cr>0).sort((a,b)=>parseFloat(b._cr)-parseFloat(a._cr))[0];
  document.getElementById("reco-sub").textContent=
    `${data.length} ads${bestCR?' · CR tốt nhất: '+bestCR["Mẫu QC"]+' ('+parseFloat(bestCR._cr).toFixed(2)+'%)':''}`  ;

  document.getElementById("reco-grid").innerHTML=cards.map(c=>
    `<div class="rc ${c.cls}"><div class="rc-head">${c.head}</div><div class="rc-list">${c.list.join("")}</div></div>`
  ).join("");
}

function barChart(elId,entries,colorFn,labelFn,numFn){
  const mx=entries[0]?entries[0][1]:1;
  document.getElementById(elId).innerHTML=entries.map(([k,v])=>{
    const c=colorFn(k),w=Math.max(Math.round(v/mx*100),3);
    return`<div class="bar-row"><div class="bar-lbl" style="color:${c}">${k}</div><div class="bar-track"><div class="bar-inner" style="width:${w}%;background:${c}"><span>${labelFn(v)}</span></div></div><div class="bar-num">${numFn(v)}</div></div>`;
  }).join("")||`<div style="font-size:12px;color:var(--text3);padding:8px 0">Không có dữ liệu</div>`;
}
function renderCharts(data){
  // Bank spend
  const bm={};data.forEach(r=>{const b=r["Ngân Hàng"]||"N/A";bm[b]=(bm[b]||0)+n(r["Tiêu Tiền"]);});
  barChart("chart-bank",Object.entries(bm).sort((a,b)=>b[1]-a[1]),bCol,fmtM,v=>fmtM(v)+"đ");
  // Category count
  const CF={"Rất Tốt":"#0d9a5e","Tốt":"#1d6fe8","TB":"#c97000","Kém":"#c45c00","Lãng Phí":"#d13535"};
  const cm={};data.forEach(r=>{const c=r.category||"N/A";cm[c]=(cm[c]||0)+1;});
  barChart("chart-cat",Object.entries(cm).sort((a,b)=>(CAT_ORDER[a[0]]??9)-(CAT_ORDER[b[0]]??9)),k=>CF[k]||"#9aa0b0",v=>v,v=>v+" ads");
  // Objective conversions
  const om={};["CTA","Reach","Engagement","Other"].forEach(o=>{
    const v=data.filter(r=>r._objective===o).reduce((s,r)=>s+parseFloat(r._total_flight||0),0);
    if(v>0)om[o]=v;
  });
  barChart("chart-obj",Object.entries(om).sort((a,b)=>b[1]-a[1]),k=>OBJ_COL[k]||"#9aa0b0",v=>Math.round(v),v=>Math.round(v));
}

// ── CARDS ────────────────────────────────────────────────────────────────
function renderCards(data){
  const s=[...data].sort((a,b)=>(CAT_ORDER[a.category]??9)-(CAT_ORDER[b.category]??9));
  if(!s.length){document.getElementById("view-cards").innerHTML="<div style='text-align:center;padding:40px;color:var(--text3)'>Không có dữ liệu</div>";return;}
  document.getElementById("view-cards").innerHTML=`<div class="cards-grid">${s.map(r=>{
    const cr=parseFloat(r._cr),er=parseFloat(r._er),ctr=parseFloat(r._ctr);
    return`<div class="ad-card c-${cCls(r.category)}">
      <div class="card-top"><div class="ad-name">${r["Mẫu QC"]||"--"}</div><span class="cat-pill ${pCls(r.category)}">${r.category||"N/A"}</span></div>
      <div class="ad-sub">${r["Chiến Dịch"]||""} · ${r["Nhóm QC"]||""}</div>
      <div class="tags-row">${bTag(r["Ngân Hàng"])} ${oTag(r._objective)}</div>
      ${thumbBlock(r)}
      <div class="chips">
        <div class="chip">Spend <b class="neu">${fmtM(n(r["Tiêu Tiền"]))}đ</b></div>
        ${mChip("CTR",isNaN(ctr)?"":ctr,0.6)}
        ${mChip("CR",isNaN(cr)?"":cr,2)}
        ${mChip("ER",isNaN(er)?"":er,0.5)}
      </div>
      ${r.justification?`<div class="div"></div><div class="note">${r.justification}</div>`:""}
      ${r.insight?`<div class="insight">→ ${r.insight}</div>`:""}
    </div>`;
  }).join("")}</div>`;
}

// ── TABLE ────────────────────────────────────────────────────────────────
function renderTable(data){
  let s=[...data];
  if(sortCol){s.sort((a,b)=>{
    let va,vb;
    if(["_ctr","_cr","_er"].includes(sortCol)){va=parseFloat(a[sortCol]);vb=parseFloat(b[sortCol]);}
    else{va=n(a[sortCol]);vb=n(b[sortCol]);if(!va&&!vb){va=String(a[sortCol]||"");vb=String(b[sortCol]||"");}}
    if(isNaN(va))return 1;if(isNaN(vb))return -1;
    return typeof va==="string"?va.localeCompare(vb)*sortDir:(va-vb)*sortDir;
  });}else s.sort((a,b)=>(CAT_ORDER[a.category]??9)-(CAT_ORDER[b.category]??9));
  if(!s.length){document.getElementById("view-table").innerHTML="<div style='padding:40px;text-align:center;color:var(--text3)'>Không có dữ liệu</div>";return;}
  const tc=col=>sortCol===col?(sortDir>0?"sa":"sd"):"";
  document.getElementById("view-table").innerHTML=`<div class="tbl-wrap"><table>
    <thead><tr>
      <th onclick="setSort('category')" class="${tc('category')}">Đánh giá</th>
      <th>Ảnh</th><th>Mẫu QC</th><th>Ngân hàng</th><th>Loại CĐ</th>
      <th onclick="setSort('Tiêu Tiền')" class="${tc('Tiêu Tiền')}">Spend</th>
      <th onclick="setSort('_ctr')" class="${tc('_ctr')}">CTR</th>
      <th onclick="setSort('_cr')"  class="${tc('_cr')}">CR</th>
      <th onclick="setSort('_er')"  class="${tc('_er')}">ER</th>
      <th>Nhận xét</th><th>Đề xuất</th>
    </tr></thead>
    <tbody>${s.map(r=>{
      const ctr=parseFloat(r._ctr),cr=parseFloat(r._cr),er=parseFloat(r._er);
      const ic=r._thumbnail
        ?`<div class="td-thumb"><img referrerpolicy="no-referrer" src="${r._thumbnail}" loading="lazy" onerror="this.style.display='none'">${r._post_url?`<a href="${r._post_url}" target="_blank" rel="noopener">FB ↗</a>`:""}</div>`
        :r._post_url?`<div class="td-thumb"><a href="${r._post_url}" target="_blank" rel="noopener">FB ↗</a></div>`:"<span style='color:var(--text3)'>—</span>";
      return`<tr>
        <td><span class="cat-pill ${pCls(r.category)}">${r.category||"N/A"}</span></td>
        <td>${ic}</td>
        <td style="min-width:140px;max-width:200px"><div style="font-weight:500;font-size:12px">${r["Mẫu QC"]||"--"}</div><div style="font-size:11px;color:var(--text3)">${r["Nhóm QC"]||""}</div></td>
        <td>${bTag(r["Ngân Hàng"])}</td>
        <td>${oTag(r._objective)}</td>
        <td class="tmono">${fmtM(n(r["Tiêu Tiền"]))}đ</td>
        <td class="tmono" style="color:${!isNaN(ctr)?(ctr>=0.6?"var(--green)":"var(--red)"):"var(--text3)"}">${!isNaN(ctr)?ctr.toFixed(2)+"%":"N/A"}</td>
        <td class="tmono" style="color:${!isNaN(cr) ?(cr >=2  ?"var(--green)":"var(--red)"):"var(--text3)"}">${!isNaN(cr) ?cr.toFixed(2) +"%":"N/A"}</td>
        <td class="tmono" style="color:${!isNaN(er) ?(er >=0.5?"var(--green)":"var(--red)"):"var(--text3)"}">${!isNaN(er) ?er.toFixed(2) +"%":"N/A"}</td>
        <td style="min-width:160px;max-width:240px;font-size:12px;color:var(--text2)">${r.justification||"—"}</td>
        <td style="min-width:140px;max-width:220px;font-size:12px;color:var(--blue)">${r.insight||"—"}</td>
      </tr>`;
    }).join("")}</tbody></table></div>`;
}

function setSort(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}renderTable(filtered);}
function switchView(v){
  curView=v;
  document.getElementById("view-cards").style.display=v==="cards"?"block":"none";
  document.getElementById("view-table").style.display=v==="table"?"block":"none";
  document.getElementById("btn-card").className ="view-btn"+(v==="cards"?" active":"");
  document.getElementById("btn-table").className="view-btn"+(v==="table"?" active":"");
  if(v==="table")renderTable(filtered);
}
function popSel(id,vals){
  const s=document.getElementById(id);const cv=s.value;
  s.innerHTML="<option value=''>Tất cả</option>";
  [...new Set(vals)].filter(Boolean).sort().forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;s.appendChild(o);});
  s.value=cv;
}
function applyFilters(){
  const b  =document.getElementById("f-bank").value;
  const obj=document.getElementById("f-obj").value;
  const c  =document.getElementById("f-camp").value;
  const a  =document.getElementById("f-adset").value;
  const ct =document.getElementById("f-cat").value;
  filtered=allData.filter(r=>{
    if(b  &&r["Ngân Hàng"] !==b)  return false;
    if(obj&&r._objective   !==obj) return false;
    if(c  &&r["Chiến Dịch"]!==c)  return false;
    if(a  &&r["Nhóm QC"]   !==a)  return false;
    if(ct &&r.category     !==ct) return false;
    return true;
  });
  updateKPIs(filtered);renderCharts(filtered);renderObjRow(filtered);buildReco(filtered);
  if(curView==="cards")renderCards(filtered);else renderTable(filtered);
  document.getElementById("count-badge").textContent=filtered.length+" / "+allData.length+" ads";
}
popSel("f-bank", allData.map(r=>r["Ngân Hàng"]));
popSel("f-camp", allData.map(r=>r["Chiến Dịch"]));
popSel("f-adset",allData.map(r=>r["Nhóm QC"]));
applyFilters();
</script>
</body>
</html>
